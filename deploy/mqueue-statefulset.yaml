apiVersion: v1
kind: Service
metadata:
  name: mqueue-headless
  labels:
    app: mqueue
spec:
  ports:
  - port: 8080
    name: http
  clusterIP: None
  selector:
    app: mqueue
---
apiVersion: v1
kind: Service
metadata:
  name: mqueue
  labels:
    app: mqueue
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
  selector:
    app: mqueue
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mqueue
spec:
  serviceName: "mqueue-headless"
  replicas: 3
  selector:
    matchLabels:
      app: mqueue
  template:
    metadata:
      labels:
        app: mqueue
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: mqueue
        image: mqueue:v6
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        env:
        # DB connection list (shards)
        - name: DATABASE_URLS
          value: "postgres://morah_paul:morah_paul@host.minikube.internal:5434/mqueue?sslmode=disable,postgres://morah_paul:morah_paul@host.minikube.internal:5433/mqueue?sslmode=disable"
        # Centralized Redis addrs for distributed rate limiting and Node ID leasing
        - name: REDIS_ADDRS
          value: "host.minikube.internal:6379,host.minikube.internal:6380"
        # Path to local persistent Write-Ahead Log directory (mounted via PVC)
        - name: WAL_DIR
          value: "/wal"
        # Secrets mounted from Kubernetes secrets manager files
        - name: JWT_SECRET_FILE
          value: "/etc/mqueue/jwt-secret"
        - name: REDIS_PASSWORD_FILE
          value: "/etc/mqueue/redis-password"
        volumeMounts:
        - name: wal-storage
          mountPath: /wal
        - name: secret-volume
          mountPath: /etc/mqueue
          readOnly: true
      volumes:
      - name: secret-volume
        secret:
          secretName: mqueue-secrets
  volumeClaimTemplates:
  - metadata:
      name: wal-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
